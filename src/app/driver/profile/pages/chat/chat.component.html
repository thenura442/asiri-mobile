<div class="chat-page">

  <!-- Header -->
  <div class="chat-header">
    <button class="back-btn" (click)="goBack()" aria-label="Back to Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="header-info">
      <h1>Branch Chat</h1>
      <p>Asiri Central Lab</p>
    </div>
  </div>

  <!-- Messages (decorative — hidden behind overlay) -->
  <div class="messages" aria-hidden="true">
    <div class="date-sep"><span>Today</span></div>
    @for (msg of messages; track msg.id) {
      <div class="msg" [class.msg--sent]="msg.sender === 'sent'"
                       [class.msg--recv]="msg.sender === 'recv'">
        <div class="bubble">{{ msg.text }}</div>
        <div class="msg-time">{{ msg.time }}</div>
      </div>
    }
  </div>

  <!-- Input bar (decorative) -->
  <div class="input-bar" aria-hidden="true">
    <input class="msg-input" placeholder="Type a message..." disabled/>
    <div class="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
           stroke="#fff">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2" fill="#fff" stroke="none"/>
      </svg>
    </div>
  </div>

  <!-- Coming Soon overlay -->
  <div class="coming-soon-overlay" role="main" aria-label="Chat coming soon">
    <div class="overlay-card">
      <div class="ov-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
        </svg>
      </div>
      <h2>Chat Coming Soon</h2>
      <p>Real-time messaging with your branch will be available in a future update. Use the call options for now.</p>
      <div class="future-badge">Future Phase</div>
    </div>
  </div>

</div>
