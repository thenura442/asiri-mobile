<div class="modal-page">
  <div class="overlay" (click)="onClose()" aria-hidden="true"></div>

  <div class="sheet" role="dialog" aria-modal="true" aria-label="Contact Branch">
    <div class="sheet-handle" aria-hidden="true"></div>

    @if (profile(); as p) {
      <!-- Branch header -->
      <div class="br-header">
        <div class="br-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3z"/>
          </svg>
        </div>
        <div class="br-info">
          <h2>{{ p.branchName }}</h2>
          <span class="br-badge">{{ p.branchType }} Branch</span>
        </div>
      </div>

      <!-- Contact cards -->
      <div class="contacts">

        <!-- Call Branch -->
        <button class="contact-card" type="button"
                (click)="onCall(p.branchPhone)"
                aria-label="Call branch — {{ p.branchPhone }}">
          <div class="ct-icon ct-icon--call" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72"/>
            </svg>
          </div>
          <div class="ct-info">
            <h4>Call Branch</h4>
            <p>Main line · <span>{{ p.branchPhone }}</span></p>
          </div>
          <svg class="ct-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>

        <!-- Call Manager -->
        <button class="contact-card" type="button"
                (click)="onCall(p.managerPhone)"
                aria-label="Call manager — {{ p.managerName }}">
          <div class="ct-icon ct-icon--call" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72"/>
            </svg>
          </div>
          <div class="ct-info">
            <h4>Call Manager</h4>
            <p>{{ p.managerName }} · <span>{{ p.managerPhone }}</span></p>
          </div>
          <svg class="ct-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>

        <!-- WhatsApp -->
        <button class="contact-card" type="button"
                (click)="onWhatsApp(p.branchPhone)"
                aria-label="WhatsApp branch">
          <div class="ct-icon ct-icon--wa" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.47 14.38c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.16-.17.2-.35.22-.64.07-.3-.15-1.26-.46-2.39-1.47-.88-.79-1.48-1.76-1.65-2.06-.17-.3-.02-.46.13-.6.13-.14.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.03-.52-.07-.15-.67-1.61-.92-2.2-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37s-1.04 1.02-1.04 2.48 1.07 2.88 1.21 3.07c.15.2 2.1 3.2 5.08 4.49.71.3 1.26.49 1.69.63.71.22 1.36.19 1.87.12.57-.09 1.76-.72 2.01-1.41.25-.7.25-1.29.17-1.41-.07-.13-.27-.2-.57-.35z"/>
            </svg>
          </div>
          <div class="ct-info">
            <h4>WhatsApp</h4>
            <p>Branch number · <span>{{ p.branchPhone }}</span></p>
          </div>
          <svg class="ct-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

      <button class="btn-close" type="button" (click)="onClose()">Close</button>
    }
  </div>
</div>
