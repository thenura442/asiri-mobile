<ion-content [fullscreen]="true" [scrollY]="true">
  <div class="page">

    <!-- Sticky header -->
    <div class="sticky-top">
      <div class="app-header">
        <button class="back-btn" (click)="goBack()" aria-label="Back to Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <h1>Settings</h1>
      </div>
    </div>

    <div class="main">

      <!-- Notifications card -->
      <div class="card">
        <div class="card-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          Notifications
        </div>

        @for (s of notificationSettings(); track s.key) {
          <div class="toggle-row">
            <div class="tg-info">
              <h4>{{ s.label }}</h4>
              <p>{{ s.desc }}</p>
            </div>
            <div class="toggle-track"
                 [class.toggle-track--on]="s.value"
                 role="switch"
                 [attr.aria-checked]="s.value"
                 [attr.aria-label]="s.label"
                 (click)="toggleNotification(s.key)"
                 tabindex="0">
              <div class="toggle-thumb"></div>
            </div>
          </div>
        }
      </div>

      <!-- Navigation card -->
      <div class="card">
        <div class="card-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          Navigation
        </div>

        <div role="radiogroup" aria-label="Choose navigation app">
          @for (app of navApps; track app.id) {
            <div class="radio-row"
                 (click)="setNavApp(app.id)"
                 role="radio"
                 [attr.aria-checked]="selectedNavApp() === app.id"
                 tabindex="0">
              <div class="radio-dot"
                   [class.radio-dot--on]="selectedNavApp() === app.id"
                   aria-hidden="true">
              </div>
              <div class="radio-info">
                <h4>{{ app.label }}</h4>
                <p>{{ app.desc }}</p>
              </div>
            </div>
          }
        </div>
      </div>

      <!-- About card -->
      <div class="card">
        <div class="card-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4M12 8h.01"/>
          </svg>
          About
        </div>

        <div class="link-row" role="button" tabindex="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>Terms &amp; Conditions</span>
          <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>

        <div class="link-row" role="button" tabindex="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>Privacy Policy</span>
          <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>

        <div class="link-row" (click)="goChat()" role="button" tabindex="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
          </svg>
          <span>Send Feedback</span>
          <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>

      <!-- Account card -->
      <div class="card">
        <div class="card-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Account
        </div>

        <div class="link-row" (click)="goChangePassword()" role="button" tabindex="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <span>Change Password</span>
          <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>

        <button class="btn-logout" type="button" (click)="onLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Log Out
        </button>
      </div>

      <p class="version-text" aria-label="App version">Asiri Driver v1.0.0</p>

      <div style="height: 40px" aria-hidden="true"></div>
    </div>
  </div>
</ion-content>
