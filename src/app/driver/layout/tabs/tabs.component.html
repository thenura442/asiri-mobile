<div class="driver-shell">
  <main class="shell-content">
    <ion-router-outlet/>
  </main>

  <nav class="nav-bar" role="navigation" aria-label="Driver navigation">
    <div class="nav-dock">

      <button class="tab-item" (click)="goTo('my-job')"
              [class.tab-item--active]="activeTab() === 'my-job'"
              aria-label="My active job">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" aria-hidden="true">
          <path d="M5 17h14v-6l-2-4H7L5 11v6z"/>
          <circle cx="7.5" cy="17.5" r="1.5"/>
          <circle cx="16.5" cy="17.5" r="1.5"/>
        </svg>
        <span>My Job</span>
      </button>

      <button class="tab-item" (click)="goTo('history')"
              [class.tab-item--active]="activeTab() === 'history'"
              aria-label="Job history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" aria-hidden="true">
          <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1"/>
        </svg>
        <span>History</span>
      </button>

      <button class="tab-item" (click)="goTo('alerts')"
              [class.tab-item--active]="activeTab() === 'alerts'"
              aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" aria-hidden="true">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <span>Alerts</span>
      </button>

      <button class="tab-item" (click)="goTo('profile')"
              [class.tab-item--active]="activeTab() === 'profile'"
              aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Profile</span>
      </button>

    </div>
  </nav>
</div>
