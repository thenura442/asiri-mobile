<button class="book-cta" type="button" (click)="bookNow.emit()"
        aria-label="Book a lab test — home collection">
  <div class="book-row">
    <!-- Icon -->
    <div class="book-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
           stroke-linecap="round" stroke="#fff">
        <path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/>
        <path d="M12 8v4M10 10h4" stroke-width="1.8"/>
      </svg>
    </div>

    <!-- Text -->
    <div class="book-text">
      <h3>Book a Test</h3>
      <p>Lab collection at your doorstep</p>
    </div>

    <!-- Arrow -->
    <div class="book-arrow" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
  </div>
</button>
