<div class="greeting-header">
  <div class="gh-top">
    <!-- Name + greeting -->
    <div class="gh-name-wrap">
      <p class="gh-greeting">{{ greeting }}</p>
      <p class="gh-name"><em>{{ firstName }}</em></p>
    </div>

    <!-- Action buttons -->
    <div class="gh-actions">
      <button class="hdr-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
      </button>
      <button class="hdr-btn" (click)="notificationsClick.emit()"
              aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" aria-hidden="true">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <div class="notif-badge" aria-hidden="true"></div>
      </button>
    </div>
  </div>

  <!-- Stats row -->
  <div class="stats-row" role="list" aria-label="Account statistics">
    <div class="stat-card" role="listitem">
      <strong>{{ stats.totalBookings }}</strong>
      <small>Bookings</small>
    </div>
    <div class="stat-card" role="listitem">
      <strong>{{ stats.totalReports }}</strong>
      <small>Reports</small>
    </div>
    <div class="stat-card" role="listitem">
      <strong>{{ stats.activeBookings }}</strong>
      <small>Active</small>
    </div>
  </div>
</div>
