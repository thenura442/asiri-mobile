<div class="recent-section">

  <!-- Section header -->
  <div class="section-head">
    <span class="section-title">Recent Bookings</span>
    <button class="view-all-btn" type="button" (click)="viewAll.emit()">
      View All
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" aria-hidden="true">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <!-- Booking cards -->
  <div class="booking-list" role="list">
    @for (b of bookings; track b.id) {
      <div class="booking-card" role="listitem"
           [attr.aria-label]="b.requestNumber + ' — ' + statusLabel(b.status)">

        <!-- Status icon -->
        <div class="card-icon"
             [class.card-icon--green]="b.status === 'completed'"
             [class.card-icon--blue]="b.status === 'processing'"
             [class.card-icon--red]="b.status === 'cancelled'"
             [class.card-icon--teal]="b.status === 'active'"
             aria-hidden="true">
          @switch (b.status) {
            @case ('completed') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            }
            @case ('processing') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            }
            @case ('cancelled') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
            }
            @default {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            }
          }
        </div>

        <!-- Info -->
        <div class="card-info">
          <div class="card-tests">{{ displayTests(b) }}</div>
          <div class="card-meta">
            {{ formatDate(b.date) }}
            &middot;
            <span class="card-req-num">{{ b.requestNumber }}</span>
          </div>
        </div>

        <!-- Right: price + badge -->
        <div class="card-right">
          <div class="card-price">{{ formatAmount(b.amountLkr) }}</div>
          <div class="status-badge"
               [class.status-badge--done]="b.status === 'completed'"
               [class.status-badge--proc]="b.status === 'processing'"
               [class.status-badge--canc]="b.status === 'cancelled'"
               [class.status-badge--actv]="b.status === 'active'">
            <i aria-hidden="true"></i>
            {{ statusLabel(b.status) }}
          </div>
        </div>

      </div>
    }
  </div>

</div>
