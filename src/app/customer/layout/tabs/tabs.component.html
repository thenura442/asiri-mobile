<div class="tabs-shell">

  <ion-router-outlet></ion-router-outlet>

  <nav class="nav-bar" role="navigation" aria-label="Main navigation">
    <div class="nav-dock">

      <!-- Home -->
      <button class="tab-item"
              (click)="goTo('home')"
              [class.tab-item--active]="activeTab() === 'home'"
              aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>

      <!-- Bookings -->
      <button class="tab-item"
              (click)="goTo('bookings')"
              [class.tab-item--active]="activeTab() === 'bookings'"
              aria-label="My Bookings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1"/>
        </svg>
        <span>Bookings</span>
      </button>

      <!-- Centre: Book a Test CTA -->
      <div class="tab-center">
        <button class="tab-center-btn" (click)="bookTest()" aria-label="Book a Test">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>

      <!-- Reports -->
      <button class="tab-item"
              (click)="goTo('reports')"
              [class.tab-item--active]="activeTab() === 'reports'"
              aria-label="Reports">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Reports</span>
      </button>

      <!-- Profile -->
      <button class="tab-item"
              (click)="goTo('profile')"
              [class.tab-item--active]="activeTab() === 'profile'"
              aria-label="Profile">
        @if (hasNotifications) {
          <div class="notification-dot"
               [attr.aria-label]="notificationCount() + ' unread notifications'">
          </div>
        }
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Profile</span>
      </button>

    </div>
  </nav>

</div>
