<div class="tabs-shell">

  <!-- Routed page content -->
  <ion-router-outlet></ion-router-outlet>

  <!-- Floating glassmorphic tab bar -->
  <nav class="nav-bar" role="navigation" aria-label="Main navigation">
    <div class="nav-dock">

      <!-- Home -->
      <a class="tab-item"
         routerLink="/customer/tabs/home"
         routerLinkActive="tab-item--active"
         [routerLinkActiveOptions]="{exact: false}"
         aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </a>

      <!-- Bookings -->
      <a class="tab-item"
         routerLink="/customer/tabs/bookings"
         routerLinkActive="tab-item--active"
         aria-label="My Bookings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1"/>
        </svg>
        <span>Bookings</span>
      </a>

      <!-- Centre: Book a Test CTA -->
      <div class="tab-center">
        <button
          class="tab-center-btn"
          (click)="bookTest()"
          aria-label="Book a Test">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>

      <!-- Reports -->
      <a class="tab-item"
         routerLink="/customer/tabs/reports"
         routerLinkActive="tab-item--active"
         aria-label="Reports">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Reports</span>
      </a>

      <!-- Profile -->
      <a class="tab-item"
         routerLink="/customer/tabs/profile"
         routerLinkActive="tab-item--active"
         aria-label="Profile">
        <!-- Notification badge -->
        @if (hasNotifications) {
          <div class="notification-dot" aria-label="{{ notificationCount() }} unread notifications"></div>
        }
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Profile</span>
      </a>

    </div>
  </nav>

</div>
