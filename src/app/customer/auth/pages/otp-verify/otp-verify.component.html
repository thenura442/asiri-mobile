<ion-content [fullscreen]="true" [scrollY]="true">
  <div class="screen">

    <div class="content">
      <!-- Back -->
      <button class="back-btn" (click)="goBack()" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <!-- Icon -->
      <div class="page-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
      </div>

      <!-- Title -->
      <h1 class="page-title">
        Verify your<br><em>phone number</em>
      </h1>
      <p class="page-subtitle">
        We sent a 6-digit code to
        <strong>{{ maskedPhone }}</strong>.
        Enter it below to verify your identity.
      </p>

      <!-- OTP boxes -->
      <div class="otp-row" role="group" aria-label="6-digit verification code">
        @for (val of otpValues; track $index) {
          <input
            #otpInput
            class="otp-box"
            type="text"
            inputmode="numeric"
            maxlength="1"
            placeholder="·"
            [value]="val"
            (input)="onInput($event, $index)"
            (keydown)="onKeydown($event, $index)"
            [attr.aria-label]="'Digit ' + ($index + 1)"
          />
        }
      </div>

      <!-- Timer + resend -->
      <div class="timer-row">
        <div class="timer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          Resend in <strong>{{ timerDisplay }}</strong>
        </div>
        <button class="resend-btn" [class.resend-btn--active]="canResend"
                (click)="onResend()" [disabled]="!canResend">
          Resend Code
        </button>
      </div>

      <!-- Verify button -->
      <button class="btn-verify" (click)="onVerify()"
              [disabled]="isLoading" [attr.aria-busy]="isLoading">
        @if (!isLoading) {
          <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" aria-hidden="true">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            Verify &amp; Continue
          </span>
        } @else {
          <span class="spinner" aria-label="Verifying"></span>
        }
      </button>
    </div>

    <div class="page-footer">
      <p>
        Didn't receive the code? Check your SMS or
        <a routerLink="/customer/auth/register">try a different number</a>
      </p>
    </div>
  </div>
</ion-content>
