<ion-content [fullscreen]="true" [scrollY]="true">
  <div class="page">

    <!-- Sticky header -->
    <div class="sticky-top">
      <div class="app-header">
        <button class="back-btn" (click)="goBack()" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="header-title">Edit Profile</span>
        <button class="save-text-btn" type="button"
                (click)="onSave()" [disabled]="isLoading()">
          {{ isLoading() ? 'Saving…' : 'Save' }}
        </button>
      </div>
    </div>

    <div class="content">

      <!-- Avatar section -->
      <div class="avatar-section">
        <div class="av-wrap">
          <div class="av">{{ initials }}</div>
          <div class="av-overlay" role="button" aria-label="Change profile photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </div>
        </div>
        <p class="av-hint">Tap to change photo</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSave()" novalidate>

        <!-- Personal info -->
        <div class="form-card">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Personal Information
          </div>

          <div class="field-row">
            <div class="field-group">
              <label class="field-label" for="firstName">First Name <span class="req">*</span></label>
              <input id="firstName" class="inp" formControlName="firstName"
                     placeholder="First name" autocomplete="given-name"/>
            </div>
            <div class="field-group">
              <label class="field-label" for="lastName">Last Name <span class="req">*</span></label>
              <input id="lastName" class="inp" formControlName="lastName"
                     placeholder="Last name" autocomplete="family-name"/>
            </div>
          </div>

          <!-- Read-only fields -->
          @if (profile()) {
            <div class="field-group">
              <label class="field-label">NIC Number</label>
              <input class="inp inp--readonly" [value]="profile()!.nic" readonly
                     aria-readonly="true"/>
              <p class="readonly-note">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M12 16v-4M12 8h.01"/>
                </svg>
                Contact your branch to update NIC
              </p>
            </div>
            <div class="field-row">
              <div class="field-group">
                <label class="field-label">Date of Birth</label>
                <input class="inp inp--readonly" [value]="profile()!.dateOfBirth" readonly aria-readonly="true"/>
              </div>
              <div class="field-group">
                <label class="field-label">Gender</label>
                <input class="inp inp--readonly" [value]="profile()!.gender | titlecase" readonly aria-readonly="true"/>
              </div>
            </div>
          }
        </div>

        <!-- Contact info -->
        <div class="form-card">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22 6 12 13 2 6"/>
            </svg>
            Contact Information
          </div>

          <div class="field-group">
            <label class="field-label" for="email">Email Address</label>
            <input id="email" class="inp" type="email" formControlName="email"
                   placeholder="you@example.com" autocomplete="email"/>
          </div>

          <div class="field-group">
            <label class="field-label" for="address">Home Address <span class="req">*</span></label>
            <textarea id="address" class="inp inp--textarea" formControlName="address"
                      placeholder="Street address, apartment number..."></textarea>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label class="field-label" for="city">City <span class="req">*</span></label>
              <input id="city" class="inp" formControlName="city"
                     placeholder="e.g. Colombo" autocomplete="address-level2"/>
            </div>
            <div class="field-group">
              <label class="field-label" for="district">District</label>
              <input id="district" class="inp" formControlName="district"
                     placeholder="e.g. Colombo"/>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" for="ecName">Emergency Contact Name</label>
            <input id="ecName" class="inp" formControlName="emergencyContactName"
                   placeholder="Full name" autocomplete="name"/>
          </div>

          <div class="field-group" style="margin-bottom:0">
            <label class="field-label" for="ecPhone">Emergency Contact Phone</label>
            <div class="phone-wrap">
              <div class="phone-prefix" aria-hidden="true">🇱🇰 +94</div>
              <input id="ecPhone" class="inp inp--phone" type="tel"
                     formControlName="emergencyContactPhone"
                     placeholder="7X XXX XXXX" inputmode="tel"/>
            </div>
          </div>
        </div>

        <!-- Special instructions -->
        <div class="form-card">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" aria-hidden="true">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Special Instructions
          </div>
          <div class="field-group" style="margin-bottom:0">
            <textarea class="inp inp--textarea" formControlName="specialInstructions"
                      placeholder="Wheelchair access, needle phobia, fasting requirements..."
                      style="height:80px"></textarea>
          </div>
        </div>

        <!-- Save button -->
        <button type="submit" class="btn-save" [disabled]="isLoading()">
          <span>
            @if (!isLoading()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Save Changes
            } @else {
              <span class="spinner" aria-label="Saving"></span>
            }
          </span>
        </button>

      </form>

      <div style="height: 40px" aria-hidden="true"></div>
    </div>
  </div>
</ion-content>
